<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DebugBridge</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 24px; background: #f6f8fa; }
        h1 { margin-bottom: 8px; }
        .hint { color: #666; font-size: 14px; margin-bottom: 20px; }
        .card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        a { color: #0969da; text-decoration: none; }
        .tag { display: inline-block; background: #ddf4ff; color: #0969da; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
<h1>DebugBridge</h1>
<p class="hint">各插件使用独立 HTML 详情页 · 路径 /plugin/{pluginId}/session/{sessionId}</p>
<div id="plugins"></div>
<div id="list"></div>
<script>
    async function loadPlugins() {
        const res = await fetch('/api/plugins');
        const plugins = await res.json();
        document.getElementById('plugins').innerHTML =
            '<div class="card"><b>已注册插件：</b> ' +
            plugins.map(p => p.name + ' (' + p.id + ')').join(' , ') +
            '</div>';
    }

    async function loadSessions() {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const list = document.getElementById('list');
        if (!sessions.length) {
            list.innerHTML = '<div class="card">暂无待处理会话</div>';
            return;
        }
        list.innerHTML = sessions.map(s =>
            `<div class="card">
                <span class="tag">${s.pluginName}</span>
                <b style="margin-left:8px">${s.tag}</b>
                <div style="margin-top:8px"><a href="${s.path}">进入插件页面 →</a></div>
            </div>`
        ).join('');
    }

    loadPlugins();
    loadSessions();
    setInterval(loadSessions, 2000);
</script>
</body>
</html>
