<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DebugBridge Session</title>
    <script src="/debug/debug-bridge.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 24px; background: #f6f8fa; }
        pre { background: #0d1117; color: #c9d1d9; padding: 16px; border-radius: 8px; overflow: auto; }
        textarea { width: 100%; min-height: 180px; font-family: monospace; }
        button { margin-right: 8px; margin-top: 12px; padding: 8px 16px; cursor: pointer; }
        .card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="card">
    <a href="/">← 返回列表</a>
    <h2 id="title">Session</h2>
    <pre id="detail"></pre>
</div>
<div class="card">
    <h3>操作</h3>
    <textarea id="replaceBody" placeholder='{"code":0}'></textarea>
    <br/>
    <button onclick="submit('pass')">放行</button>
    <button onclick="submit('replace')">替换</button>
    <button onclick="submit('abort')">中止</button>
</div>
<script>
    async function loadDetail() {
        const data = await DebugBridge.fetchDetail();
        document.getElementById('title').innerText = data.pluginName + ' · ' + data.tag;
        document.getElementById('detail').innerText = DebugBridge.prettyJson(data.display);
        document.getElementById('replaceBody').value = data.display;
    }

    async function submit(action) {
        await DebugBridge.decide(null, {
            action: action,
            body: document.getElementById('replaceBody').value,
            code: 200
        });
        alert('已提交: ' + action);
        location.href = '/';
    }

    loadDetail().catch(err => alert(err.message));
</script>
</body>
</html>
