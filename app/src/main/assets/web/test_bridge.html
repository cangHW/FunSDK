<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView Bridge Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<h1>WebView Bridge Example</h1>
<button id="callBridgeButton">Call Android Bridge</button>

<script>
    // JavaScript function to call the Android bridge method
    document.getElementById("callBridgeButton").addEventListener("click", function() {
        if (window.xxx) {
            // 调用 Android 的方法
            window.xxx.close();
        } else {
            console.error("xxx is not available.");
        }
    });
</script>
</body>
</html>
